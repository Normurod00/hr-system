services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hr-app
    working_dir: /opt/hr-system
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - ./:/opt/hr-system
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      HR_AI_URL: http://ai:8095
    networks:
      - hr-net

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hr-worker
    working_dir: /opt/hr-system
    restart: unless-stopped
    command: supervisord -c /etc/supervisor/conf.d/supervisord.conf -n
    volumes:
      - ./:/opt/hr-system
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      HR_AI_URL: http://ai:8095
    networks:
      - hr-net

  ai:
    build:
      context: .
      dockerfile: docker/ai/Dockerfile
    container_name: hr-ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - ./ai_server/config.yaml:/app/config.yaml
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8095/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hr-net

  db:
    image: postgres:16-alpine
    container_name: hr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hr_brb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-hr_brb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hr-net

  redis:
    image: redis:7-alpine
    container_name: hr-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hr-net

volumes:
  pgdata:
  redisdata:

networks:
  hr-net:
    driver: bridge