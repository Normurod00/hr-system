# HR AI Server Configuration
# ============================

server:
  host: "0.0.0.0"
  port: 8095
  debug: false
  cors_origins:
    - "http://localhost"
    - "http://127.0.0.1"
    - "http://204.168.217.54"
    - "https://204.168.217.54"
    - "http://app"
    - "http://hr-app"
    - "http://hr-brb"
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"
    - "*"

# LLM Configuration (Hybrid AI)
llm:
  # Feature flag: true = use LLM, false = rule-based only
  enabled: true

  # Провайдер: gemini, anthropic, openai
  provider: "gemini"

  # API ключи (через ENV)
  gemini_api_key: ""     # GEMINI_API_KEY env
  anthropic_api_key: ""  # ANTHROPIC_API_KEY env
  openai_api_key: ""     # OPENAI_API_KEY env

  # Уровень модели по умолчанию: cheap, medium, strong
  default_tier: "medium"

  # Таймаут запроса к LLM (секунды)
  timeout: 60

  # Максимум повторных попыток
  max_retries: 2

# Обработка документов
documents:
  max_file_size_mb: 10
  allowed_extensions:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".txt"
    - ".rtf"
  temp_dir: "temp"

# HR-специфичные настройки
hr:
  # Веса для match score
  match_weights:
    must_have_skills: 0.5
    nice_to_have_skills: 0.3
    experience: 0.2

  # Минимальный score для shortlist
  min_shortlist_score: 60

  # Генерация отчётов
  generate:
    strengths: true
    weaknesses: true
    risks: true
    questions: true
    recommendation: true

# Логирование
logging:
  level: "INFO"
  file: "logs/ai_server.log"
  max_size_mb: 10
  backup_count: 5
